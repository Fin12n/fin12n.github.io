<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - EZ Studio</title>
    <!--Bootstraps CSS-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css"
    />
    <!--Font Awsome-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH7Zlbv0sL0sn7O/xVqaGhn8Yh6X2nKL6e/3nBVSXh6Yk1Jq8gI2+owz0NfK5p7Y4sQmD8Y+hf8cp3r5F+o+mw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=BBH+Sans+Bogle&family=Bitcount+Prop+Double+Ink:wght@100..900&family=Roboto:wght@700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
    <!--Custom CSS-->
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/forgot-password.css" />
    <link rel="logo" href="../assets/imgs/logo.webp" />
  </head>
  <body>
    <!--Forgot Password Form-->
    <a href="./login.html" class="btn btn-homeback" style="background-color: var(--ez-yellow);">Back to Login</a>
    <div class="forgot-password-container">
      <div class="row mx-auto justify-content-center align-items-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-4 forgot-password-form">
          <form action="#" method="POST" class="p-4 rounded-3">
            <div class="text-center mb-4">
              <i class="fas fa-lock icon-lock"></i>
            </div>
            <h2 class="text-center mb-3 title-forgot-password" style="font-family: 'Roboto', sans-serif;">Forgot Password?</h2>
            <p class="text-center description-text mb-4">
              No worries! Enter your email address below and we'll send you a link to reset your password.
            </p>
            
            <div class="mb-3">
              <label for="email" class="form-label">Email Address: <small style="color: red;">*</small></label>
              <input
                type="email"
                class="form-control"
                id="email"
                name="email"
                placeholder="Enter your email address"
                required
              />
            </div>
            
            <div class="d-grid mb-3">
              <button type="submit" class="btn btn-primary" style="background-color: var(--ez-yellow); border: none;">Send Reset Link</button>
            </div>
            
            <div class="text-center">
              <p class="back-to-login">Remember your password? <a href="./login.html" class="login-link">Login here</a></p>
            </div>
          </form>
          <div class="required-note">
            <small style="color: red;">*</small> is Required
          </div>
        </div>
      </div>
    </div>
    <!--Bootstraps JS-->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.bundle.min.js"
      integrity="sha512-HvOjJrdwNpDbkGJIG2ZNqDlVqMo77qbs4Me4cah0HoDrfhrbA+8SBlZn1KrvAQw7cILLPFJvdwIgphzQmMm+Pw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
  </body>
</html>
